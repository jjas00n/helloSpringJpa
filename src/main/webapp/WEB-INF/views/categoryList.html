
<!Doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카테고리 관리</title>
</head>
<body>
<h2>카테고리 목록</h2>
<!-- categoryList.html : 성공/오류 Flash 메시지 표시 -->
<p th:if="${successMessage}" th:text="${successMessage}"></p>
<p th:if="${errorMessage}" th:text="${errorMessage}"></p>


<a href="/categories/create">+ 새 카테고리 등록</a>

<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>카테고리명</th>
        <th>작업</th>
    </tr>
    </thead>
    <tbody>
    <!-- th:each로 목록 반복, 삭제는 POST 폼으로 처리 -->
    <tr th:each="cat : ${categories}">
        <td th:text="${cat.id}"></td>
        <td th:text="${cat.name}"></td>
        <td>
            <!-- th:action에서 경로 변수 (id=${cat.id}) 바인딩 방법 -->
            <form th:action="@{/categories/{id}/delete(id=${cat.id})}" method="post">
                <button type="submit">삭제</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
<footer style="margin-top:30px; padding:10px; border-top:1px solid #ccc; font-size:13px; color:#555;">
    실습 수행 일시:
    <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 HH:mm:ss')}"></span>
    &nbsp;│&nbsp; 학번: 2271213 &nbsp;│&nbsp; 성명: 정채운
</footer></body>
</html>
</tr>
